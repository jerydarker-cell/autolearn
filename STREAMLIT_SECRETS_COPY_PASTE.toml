# COPY TO: Streamlit Cloud → Manage app → Settings → Secrets
# Điền thông tin thật vào các dòng CHANGEME.
# Không upload file này lên GitHub nếu đã điền key thật.

DB_BACKEND = "supabase"
SUPABASE_URL = "CHANGEME_PROJECT_URL"
SUPABASE_SERVICE_ROLE_KEY = "CHANGEME_SERVICE_ROLE_KEY"

# AI nội bộ tiết kiệm API: mặc định không gọi API ngoài
AI_MODE = "offline"
USE_EXTERNAL_AI = "false"
AI_CACHE_ENABLED = "true"
MAX_EXTERNAL_AI_CALLS_PER_SESSION = "0"

# Optional: chỉ cần nếu dùng Google Veo/Gemini
GOOGLE_API_KEY = ""

# Email nhắc thuốc ngoài app qua GitHub Actions
SMTP_HOST = "smtp.gmail.com"
SMTP_PORT = "587"
SMTP_USER = "CHANGEME_EMAIL@gmail.com"
SMTP_PASSWORD = "CHANGEME_EMAIL_APP_PASSWORD"
SMTP_FROM = "CHANGEME_EMAIL@gmail.com"

# Optional: Telegram reminder
TELEGRAM_BOT_TOKEN = ""
REMINDER_LOOKAHEAD_MIN = "15"
